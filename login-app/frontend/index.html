<!DOCTYPE html>
<html>
<head>
  <title>Login App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 350px;
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      background: #007bff;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    .toggle {
      margin-top: 15px;
      color: blue;
      cursor: pointer;
    }

    #welcome {
      display: none;
    }
  </style>
</head>
<body>

<div class="container">

  <!-- LOGIN -->
  <div id="loginBox">
    <h2>Login</h2>
    <input id="logUser" placeholder="Username" />
    <input id="logPass" type="password" placeholder="Password" />
    <button onclick="login()">Login</button>
    <div class="toggle" onclick="showRegister()">Don't have account? Register</div>
  </div>

  <!-- REGISTER -->
  <div id="registerBox" style="display:none;">
    <h2>Register</h2>
    <input id="regUser" placeholder="Username" />
    <input id="regPass" type="password" placeholder="Password" />
    <button onclick="register()">Register</button>
    <div class="toggle" onclick="showLogin()">Already have account? Login</div>
  </div>

  <!-- WELCOME -->
  <div id="welcome">
    <h2 id="welcomeText"></h2>
    <button onclick="logout()">Logout</button>
  </div>

  <p id="msg"></p>

</div>

<script src="script.js"></script>
</body>
</html>
